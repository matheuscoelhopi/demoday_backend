name: CI/CD Backend API

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Instalar Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Configurar chave SSH para o EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY2 }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Executar Ansible Playbook de Deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          echo "[production]" > inventory.ini
          echo "${{ secrets.EC2_HOST2 }} ansible_user=${{ secrets.EC2_USERNAME }}" >> inventory.ini

          REPO_LOWER=${GITHUB_REPOSITORY,,}

          ansible-playbook -i inventory.ini ansible/deploy-backend.yml \
            -e "ghcr_user=${{ github.actor }}" \
            -e "ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
            -e "app_image=ghcr.io/${REPO_LOWER}:sha-${{ github.sha }}" \
            -e "frontend_url=${{ secrets.FRONTEND_URL }}"
